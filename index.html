<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>2048 - 网页版小游戏</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #1a1a2e;
            --bg-secondary: #16213e;
            --bg-tertiary: #0f3460;
            --accent-primary: #e94560;
            --accent-secondary: #ff6b6b;
            --accent-gold: #ffd700;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --cell-empty: #2d2d44;
            --grid-bg: #252540;
            --shadow-color: rgba(233, 69, 96, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 50%, var(--bg-tertiary) 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: clamp(10px, 3vw, 20px);
            overflow-x: hidden;
        }

        .game-container {
            background: linear-gradient(145deg, rgba(45, 45, 68, 0.8), rgba(37, 37, 64, 0.9));
            border-radius: clamp(16px, 4vw, 24px);
            padding: clamp(15px, 4vw, 30px);
            box-shadow: 
                0 25px 50px -12px rgba(0, 0, 0, 0.5),
                0 0 100px rgba(233, 69, 96, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            max-width: 500px;
            width: 100%;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: clamp(15px, 3vw, 25px);
            flex-wrap: wrap;
            gap: 10px;
        }

        .title {
            font-family: 'Poppins', sans-serif;
            font-size: clamp(2rem, 8vw, 3.5rem);
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary), var(--accent-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(233, 69, 96, 0.5);
            letter-spacing: 2px;
        }

        .score-container {
            display: flex;
            gap: clamp(8px, 2vw, 15px);
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .score-box {
            background: linear-gradient(145deg, var(--bg-tertiary), var(--bg-secondary));
            border-radius: clamp(8px, 2vw, 12px);
            padding: clamp(8px, 2vw, 15px) clamp(12px, 3vw, 20px);
            text-align: center;
            min-width: clamp(70px, 18vw, 100px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .score-box.best {
            border: 1px solid rgba(255, 215, 0, 0.3);
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.2);
        }

        .best-value {
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.7);
        }

        .score-label {
            font-size: clamp(0.6rem, 2vw, 0.75rem);
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .score-value {
            font-family: 'Poppins', sans-serif;
            font-size: clamp(1rem, 4vw, 1.5rem);
            font-weight: 700;
            color: var(--accent-gold);
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        .timer-value {
            color: var(--accent-secondary);
            text-shadow: 0 0 10px rgba(255, 107, 107, 0.5);
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: clamp(8px, 2vw, 12px);
            margin-bottom: clamp(15px, 3vw, 20px);
            flex-wrap: wrap;
        }

        .btn {
            font-family: 'Noto Sans SC', sans-serif;
            font-size: clamp(0.75rem, 2.5vw, 0.9rem);
            font-weight: 600;
            padding: clamp(8px, 2vw, 12px) clamp(16px, 4vw, 24px);
            border: none;
            border-radius: clamp(8px, 2vw, 10px);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn-start {
            background: linear-gradient(135deg, #4ade80, #22c55e);
            color: white;
            box-shadow: 0 4px 15px rgba(74, 222, 128, 0.4);
        }

        .btn-start:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(74, 222, 128, 0.5);
        }

        .btn-pause {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            color: white;
            box-shadow: 0 4px 15px rgba(251, 191, 36, 0.4);
        }

        .btn-pause:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(251, 191, 36, 0.5);
        }

        .btn-restart {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: white;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4);
        }

        .btn-restart:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(233, 69, 96, 0.5);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .grid-container {
            position: relative;
            background: var(--grid-bg);
            border-radius: clamp(12px, 3vw, 16px);
            padding: clamp(8px, 2vw, 12px);
            box-shadow: 
                inset 0 2px 10px rgba(0, 0, 0, 0.5),
                0 0 30px rgba(233, 69, 96, 0.1);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: clamp(6px, 2vw, 10px);
        }

        .cell {
            width: clamp(60px, 18vw, 100px);
            height: clamp(60px, 18vw, 100px);
            background: var(--cell-empty);
            border-radius: clamp(8px, 2vw, 12px);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', sans-serif;
            font-size: clamp(1.2rem, 5vw, 2rem);
            font-weight: 700;
            color: white;
            transition: all 0.15s ease;
            position: relative;
            overflow: hidden;
        }

        .cell::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 30%;
            background: linear-gradient(to bottom, rgba(255, 255, 255, 0.1), transparent);
            border-radius: clamp(8px, 2vw, 12px) clamp(8px, 2vw, 12px) 0 0;
        }

        .cell[data-value="2"] {
            background: linear-gradient(145deg, #3b82f6, #2563eb);
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }

        .cell[data-value="4"] {
            background: linear-gradient(145deg, #8b5cf6, #7c3aed);
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);
        }

        .cell[data-value="8"] {
            background: linear-gradient(145deg, #ec4899, #db2777);
            box-shadow: 0 4px 15px rgba(236, 72, 153, 0.4);
        }

        .cell[data-value="16"] {
            background: linear-gradient(145deg, #f97316, #ea580c);
            box-shadow: 0 4px 15px rgba(249, 115, 22, 0.4);
        }

        .cell[data-value="32"] {
            background: linear-gradient(145deg, #ef4444, #dc2626);
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4);
        }

        .cell[data-value="64"] {
            background: linear-gradient(145deg, #e94560, #c73e54);
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.5);
        }

        .cell[data-value="128"] {
            background: linear-gradient(145deg, #fbbf24, #f59e0b);
            box-shadow: 0 4px 20px rgba(251, 191, 36, 0.5);
            font-size: clamp(1rem, 4vw, 1.8rem);
        }

        .cell[data-value="256"] {
            background: linear-gradient(145deg, #a3e635, #84cc16);
            box-shadow: 0 4px 20px rgba(163, 230, 53, 0.5);
            font-size: clamp(1rem, 4vw, 1.8rem);
        }

        .cell[data-value="512"] {
            background: linear-gradient(145deg, #22d3ee, #06b6d4);
            box-shadow: 0 4px 20px rgba(34, 211, 238, 0.5);
            font-size: clamp(1rem, 4vw, 1.8rem);
        }

        .cell[data-value="1024"] {
            background: linear-gradient(145deg, #a78bfa, #8b5cf6);
            box-shadow: 0 4px 25px rgba(167, 139, 250, 0.6);
            font-size: clamp(0.8rem, 3vw, 1.4rem);
        }

        .cell[data-value="2048"] {
            background: linear-gradient(145deg, #ffd700, #ffb700);
            box-shadow: 0 4px 30px rgba(255, 215, 0, 0.7);
            font-size: clamp(0.8rem, 3vw, 1.4rem);
            animation: glow 1s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from {
                box-shadow: 0 4px 30px rgba(255, 215, 0, 0.7);
            }
            to {
                box-shadow: 0 4px 50px rgba(255, 215, 0, 1), 0 0 100px rgba(255, 215, 0, 0.5);
            }
        }

        .cell.new {
            animation: popIn 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes popIn {
            0% {
                transform: scale(0);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .cell.merged {
            animation: merge 0.2s ease;
        }

        @keyframes merge {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.2);
            }
            100% {
                transform: scale(1);
            }
        }

        .game-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            border-radius: clamp(12px, 3vw, 16px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
            z-index: 10;
        }

        .game-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .overlay-title {
            font-family: 'Poppins', sans-serif;
            font-size: clamp(1.5rem, 6vw, 2.5rem);
            font-weight: 800;
            margin-bottom: 15px;
            text-align: center;
        }

        .overlay-title.win {
            background: linear-gradient(135deg, #ffd700, #ffb700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
        }

        .overlay-title.lose {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .overlay-score {
            font-size: clamp(1rem, 3vw, 1.2rem);
            color: var(--text-secondary);
            margin-bottom: 20px;
        }

        .overlay-btn {
            font-family: 'Noto Sans SC', sans-serif;
            font-size: clamp(0.9rem, 3vw, 1rem);
            font-weight: 600;
            padding: clamp(10px, 3vw, 15px) clamp(25px, 6vw, 40px);
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4);
        }

        .overlay-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(233, 69, 96, 0.5);
        }

        .instructions {
            margin-top: clamp(15px, 3vw, 20px);
            text-align: center;
            color: var(--text-secondary);
            font-size: clamp(0.7rem, 2vw, 0.85rem);
            line-height: 1.6;
        }

        .instructions strong {
            color: var(--accent-secondary);
        }

        .desktop-hint {
            display: inline;
        }

        .mobile-hint {
            display: none;
        }

        @media (max-width: 600px) {
            .desktop-hint {
                display: none;
            }
            .mobile-hint {
                display: inline;
            }
        }

        @media (hover: none) {
            .desktop-hint {
                display: none;
            }
            .mobile-hint {
                display: inline;
            }
        }

        .sound-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(145deg, var(--bg-tertiary), var(--bg-secondary));
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .sound-toggle:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(233, 69, 96, 0.3);
        }

        .sound-toggle svg {
            width: 24px;
            height: 24px;
            fill: white;
        }

        .mode-toggle {
            position: fixed;
            top: 20px;
            left: 20px;
            background: linear-gradient(145deg, var(--bg-tertiary), var(--bg-secondary));
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            padding: 8px 15px;
            display: none;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 100;
            color: var(--text-secondary);
            font-size: 0.75rem;
            font-weight: 600;
        }

        .mode-toggle:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(233, 69, 96, 0.3);
        }

        .mode-toggle.active {
            border-color: var(--accent-primary);
            color: var(--accent-primary);
        }

        .mode-toggle svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        @media (max-width: 600px) {
            .mode-toggle {
                display: flex;
            }
        }

        @media (hover: none) {
            .mode-toggle {
                display: flex;
            }
        }

        .mobile-controls {
            display: none;
            margin-top: clamp(15px, 3vw, 20px);
            justify-content: center;
        }

        .mobile-controls.active {
            display: flex;
        }

        .d-pad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 5px;
            width: clamp(150px, 40vw, 180px);
            height: clamp(150px, 40vw, 180px);
        }

        .d-btn {
            background: linear-gradient(145deg, var(--bg-tertiary), var(--bg-secondary));
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: white;
            font-size: clamp(1.2rem, 4vw, 1.5rem);
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }

        .d-btn:active {
            background: var(--accent-primary);
            transform: scale(0.95);
        }

        .d-btn.up { grid-column: 2; grid-row: 1; }
        .d-btn.left { grid-column: 1; grid-row: 2; }
        .d-btn.right { grid-column: 3; grid-row: 2; }
        .d-btn.down { grid-column: 2; grid-row: 3; }

        .footer {
            margin-top: clamp(15px, 3vw, 25px);
            text-align: center;
            color: var(--text-secondary);
            font-size: clamp(0.65rem, 1.8vw, 0.75rem);
            line-height: 1.8;
            opacity: 0.8;
        }

        .footer strong {
            color: var(--accent-secondary);
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: -1;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--accent-primary);
            border-radius: 50%;
            opacity: 0.3;
            animation: float 15s infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.3;
            }
            90% {
                opacity: 0.3;
            }
            100% {
                transform: translateY(-100vh) rotate(720deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    
    <button class="sound-toggle" id="soundToggle" title="切换音效">
        <svg viewBox="0 0 24 24" id="soundIcon">
            <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
        </svg>
    </button>

    <button class="mode-toggle" id="modeToggle" title="切换操作模式">
        <svg viewBox="0 0 24 24" id="modeIcon">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
        </svg>
        <span id="modeText">按键</span>
    </button>

    <div class="game-container">
        <div class="header">
            <h1 class="title">2048</h1>
            <div class="score-container">
                <div class="score-box">
                    <div class="score-label">分数</div>
                    <div class="score-value" id="score">0</div>
                </div>
                <div class="score-box best">
                    <div class="score-label">最高分</div>
                    <div class="score-value best-value" id="bestScore">0</div>
                </div>
                <div class="score-box">
                    <div class="score-label">时间</div>
                    <div class="score-value timer-value" id="timer">00:00</div>
                </div>
            </div>
        </div>

        <div class="controls">
            <button class="btn btn-start" id="startBtn">开始游戏</button>
            <button class="btn btn-pause" id="pauseBtn" disabled>暂停</button>
            <button class="btn btn-restart" id="restartBtn">重新开始</button>
        </div>

        <div class="grid-container">
            <div class="grid" id="grid"></div>
            <div class="game-overlay" id="gameOverlay">
                <div class="overlay-title" id="overlayTitle">游戏结束</div>
                <div class="overlay-score" id="overlayScore">最终得分: 0</div>
                <button class="overlay-btn" id="overlayBtn">再来一局</button>
            </div>
        </div>

        <div class="instructions">
            <span class="desktop-hint">使用 <strong>方向键 ↑↓←→</strong> 或 <strong>WASD</strong> 移动方块</span>
            <span class="mobile-hint">在屏幕上 <strong>滑动</strong> 移动方块</span>
            <br>相同数字的方块会合并，目标是合成 <strong>2048</strong>！
        </div>

        <div class="mobile-controls" id="mobileControls">
            <div class="d-pad">
                <button class="d-btn up" data-dir="up">↑</button>
                <button class="d-btn left" data-dir="left">←</button>
                <button class="d-btn right" data-dir="right">→</button>
                <button class="d-btn down" data-dir="down">↓</button>
            </div>
        </div>
    </div>

    <footer class="footer">
        © 2026 liuding 版权所有<br>
        2026liuding·网页版2048小游戏<br>
        开发者:liuding | 技术支持：Trae AI<br>
        保留所有权利·个人原创作品
    </footer>

    <script>
        const Game2048 = (function() {
            let grid = [];
            let score = 0;
            let bestScore = parseInt(localStorage.getItem('best2048') || '0');
            let gameStarted = false;
            let gamePaused = false;
            let gameOver = false;
            let timerInterval = null;
            let seconds = 0;
            let soundEnabled = true;
            let audioContext = null;

            const gridElement = document.getElementById('grid');
            const scoreElement = document.getElementById('score');
            const bestScoreElement = document.getElementById('bestScore');
            const timerElement = document.getElementById('timer');
            const startBtn = document.getElementById('startBtn');
            const pauseBtn = document.getElementById('pauseBtn');
            const restartBtn = document.getElementById('restartBtn');
            const gameOverlay = document.getElementById('gameOverlay');
            const overlayTitle = document.getElementById('overlayTitle');
            const overlayScore = document.getElementById('overlayScore');
            const overlayBtn = document.getElementById('overlayBtn');
            const soundToggle = document.getElementById('soundToggle');
            const soundIcon = document.getElementById('soundIcon');
            const modeToggle = document.getElementById('modeToggle');
            const modeText = document.getElementById('modeText');
            const modeIcon = document.getElementById('modeIcon');
            const mobileControls = document.getElementById('mobileControls');

            let controlMode = localStorage.getItem('controlMode2048') || 'swipe';

            function initAudio() {
                if (!audioContext) {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                }
            }

            function playSound(type) {
                if (!soundEnabled || !audioContext) return;

                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);

                const now = audioContext.currentTime;

                switch(type) {
                    case 'move':
                        oscillator.frequency.setValueAtTime(300, now);
                        oscillator.frequency.exponentialRampToValueAtTime(200, now + 0.1);
                        gainNode.gain.setValueAtTime(0.1, now);
                        gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                        oscillator.start(now);
                        oscillator.stop(now + 0.1);
                        break;
                    case 'merge':
                        oscillator.frequency.setValueAtTime(400, now);
                        oscillator.frequency.exponentialRampToValueAtTime(600, now + 0.15);
                        gainNode.gain.setValueAtTime(0.15, now);
                        gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                        oscillator.start(now);
                        oscillator.stop(now + 0.15);
                        break;
                    case 'win':
                        const notes = [523.25, 659.25, 783.99, 1046.50];
                        notes.forEach((freq, i) => {
                            const osc = audioContext.createOscillator();
                            const gain = audioContext.createGain();
                            osc.connect(gain);
                            gain.connect(audioContext.destination);
                            osc.frequency.setValueAtTime(freq, now + i * 0.15);
                            gain.gain.setValueAtTime(0.2, now + i * 0.15);
                            gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.15 + 0.3);
                            osc.start(now + i * 0.15);
                            osc.stop(now + i * 0.15 + 0.3);
                        });
                        return;
                    case 'lose':
                        oscillator.frequency.setValueAtTime(300, now);
                        oscillator.frequency.exponentialRampToValueAtTime(100, now + 0.5);
                        gainNode.gain.setValueAtTime(0.2, now);
                        gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                        oscillator.start(now);
                        oscillator.stop(now + 0.5);
                        break;
                    case 'start':
                        oscillator.frequency.setValueAtTime(440, now);
                        oscillator.frequency.exponentialRampToValueAtTime(880, now + 0.1);
                        gainNode.gain.setValueAtTime(0.15, now);
                        gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                        oscillator.start(now);
                        oscillator.stop(now + 0.2);
                        break;
                }
            }

            function createParticles() {
                const container = document.getElementById('particles');
                for (let i = 0; i < 20; i++) {
                    const particle = document.createElement('div');
                    particle.className = 'particle';
                    particle.style.left = Math.random() * 100 + '%';
                    particle.style.animationDelay = Math.random() * 15 + 's';
                    particle.style.animationDuration = (15 + Math.random() * 10) + 's';
                    const colors = ['#e94560', '#ff6b6b', '#ffd700', '#4ade80', '#22d3ee'];
                    particle.style.background = colors[Math.floor(Math.random() * colors.length)];
                    container.appendChild(particle);
                }
            }

            function initGrid() {
                grid = Array(4).fill(null).map(() => Array(4).fill(0));
                renderGrid();
            }

            function renderGrid() {
                gridElement.innerHTML = '';
                for (let i = 0; i < 4; i++) {
                    for (let j = 0; j < 4; j++) {
                        const cell = document.createElement('div');
                        cell.className = 'cell';
                        const value = grid[i][j];
                        if (value > 0) {
                            cell.textContent = value;
                            cell.dataset.value = value;
                        }
                        gridElement.appendChild(cell);
                    }
                }
            }

            function addRandomTile(isNew = true) {
                const emptyCells = [];
                for (let i = 0; i < 4; i++) {
                    for (let j = 0; j < 4; j++) {
                        if (grid[i][j] === 0) {
                            emptyCells.push({row: i, col: j});
                        }
                    }
                }
                if (emptyCells.length === 0) return false;

                const {row, col} = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                grid[row][col] = Math.random() < 0.9 ? 2 : 4;

                if (isNew) {
                    renderGrid();
                    const index = row * 4 + col;
                    const cell = gridElement.children[index];
                    cell.classList.add('new');
                    setTimeout(() => cell.classList.remove('new'), 200);
                }

                return true;
            }

            function generateInitialTiles() {
                const positions = [];
                while (positions.length < 2) {
                    const row = Math.floor(Math.random() * 4);
                    const col = Math.floor(Math.random() * 4);
                    const key = `${row}-${col}`;
                    if (!positions.includes(key)) {
                        positions.push(key);
                        grid[row][col] = Math.random() < 0.9 ? 2 : 4;
                    }
                }
                renderGrid();
            }

            function move(direction) {
                if (!gameStarted || gamePaused || gameOver) return false;

                let moved = false;
                let merged = false;
                const newGrid = grid.map(row => [...row]);

                const moveRow = (row, reverse) => {
                    let arr = reverse ? [...row].reverse() : [...row];
                    let newArr = arr.filter(x => x !== 0);
                    let result = [];
                    let mergedIndices = [];

                    for (let i = 0; i < newArr.length; i++) {
                        if (i < newArr.length - 1 && newArr[i] === newArr[i + 1]) {
                            const mergedValue = newArr[i] * 2;
                            result.push(mergedValue);
                            score += mergedValue;
                            mergedIndices.push(result.length - 1);
                            merged = true;
                            i++;
                        } else {
                            result.push(newArr[i]);
                        }
                    }

                    while (result.length < 4) {
                        result.push(0);
                    }

                    return {
                        row: reverse ? result.reverse() : result,
                        mergedIndices: reverse ? mergedIndices.map(i => 3 - i) : mergedIndices
                    };
                };

                let mergedPositions = [];

                if (direction === 'left' || direction === 'right') {
                    for (let i = 0; i < 4; i++) {
                        const {row: newRow, mergedIndices: mi} = moveRow(newGrid[i], direction === 'right');
                        if (newGrid[i].join(',') !== newRow.join(',')) {
                            moved = true;
                        }
                        newGrid[i] = newRow;
                        mi.forEach(j => mergedPositions.push({row: i, col: j}));
                    }
                } else {
                    for (let j = 0; j < 4; j++) {
                        const col = [newGrid[0][j], newGrid[1][j], newGrid[2][j], newGrid[3][j]];
                        const {row: newCol, mergedIndices: mi} = moveRow(col, direction === 'down');
                        for (let i = 0; i < 4; i++) {
                            if (newGrid[i][j] !== newCol[i]) {
                                moved = true;
                            }
                            newGrid[i][j] = newCol[i];
                        }
                        mi.forEach(i => mergedPositions.push({row: i, col: j}));
                    }
                }

                if (moved) {
                    grid = newGrid;
                    renderGrid();
                    
                    mergedPositions.forEach(({row, col}) => {
                        const index = row * 4 + col;
                        const cell = gridElement.children[index];
                        cell.classList.add('merged');
                        setTimeout(() => cell.classList.remove('merged'), 200);
                    });

                    if (merged) {
                        playSound('merge');
                    } else {
                        playSound('move');
                    }

                    updateScore();
                    
                    setTimeout(() => {
                        addRandomTile();
                        checkGameState();
                    }, 100);
                }

                return moved;
            }

            function updateScore() {
                scoreElement.textContent = score;
                if (score > bestScore) {
                    bestScore = score;
                    localStorage.setItem('best2048', bestScore.toString());
                    bestScoreElement.textContent = bestScore;
                }
            }

            function updateBestScoreDisplay() {
                bestScoreElement.textContent = bestScore;
            }

            function formatTime(secs) {
                const mins = Math.floor(secs / 60);
                const s = secs % 60;
                return `${mins.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            }

            function startTimer() {
                if (timerInterval) clearInterval(timerInterval);
                seconds = 0;
                timerElement.textContent = '00:00';
                timerInterval = setInterval(() => {
                    if (!gamePaused && gameStarted && !gameOver) {
                        seconds++;
                        timerElement.textContent = formatTime(seconds);
                    }
                }, 1000);
            }

            function stopTimer() {
                if (timerInterval) {
                    clearInterval(timerInterval);
                    timerInterval = null;
                }
            }

            function checkWin() {
                for (let i = 0; i < 4; i++) {
                    for (let j = 0; j < 4; j++) {
                        if (grid[i][j] === 2048) {
                            return true;
                        }
                    }
                }
                return false;
            }

            function canMove() {
                for (let i = 0; i < 4; i++) {
                    for (let j = 0; j < 4; j++) {
                        if (grid[i][j] === 0) return true;
                        if (j < 3 && grid[i][j] === grid[i][j + 1]) return true;
                        if (i < 3 && grid[i][j] === grid[i + 1][j]) return true;
                    }
                }
                return false;
            }

            function checkGameState() {
                if (checkWin()) {
                    gameOver = true;
                    stopTimer();
                    playSound('win');
                    showOverlay('恭喜胜利！', true);
                    return;
                }

                if (!canMove()) {
                    gameOver = true;
                    stopTimer();
                    playSound('lose');
                    showOverlay('游戏结束', false);
                }
            }

            function showOverlay(title, isWin) {
                overlayTitle.textContent = title;
                overlayTitle.className = 'overlay-title ' + (isWin ? 'win' : 'lose');
                overlayScore.textContent = `最终得分: ${score} | 用时: ${formatTime(seconds)}`;
                gameOverlay.classList.add('active');
            }

            function hideOverlay() {
                gameOverlay.classList.remove('active');
            }

            function startGame() {
                initAudio();
                initGrid();
                score = 0;
                updateScore();
                gameStarted = true;
                gamePaused = false;
                gameOver = false;
                hideOverlay();
                generateInitialTiles();
                startTimer();
                playSound('start');
                
                startBtn.disabled = true;
                pauseBtn.disabled = false;
                pauseBtn.textContent = '暂停';
            }

            function togglePause() {
                if (!gameStarted || gameOver) return;
                
                gamePaused = !gamePaused;
                pauseBtn.textContent = gamePaused ? '继续' : '暂停';
                
                if (gamePaused) {
                    gameOverlay.classList.add('active');
                    overlayTitle.textContent = '游戏暂停';
                    overlayTitle.className = 'overlay-title';
                    overlayScore.textContent = `当前得分: ${score}`;
                    overlayBtn.textContent = '继续游戏';
                } else {
                    hideOverlay();
                    overlayBtn.textContent = '再来一局';
                }
            }

            function restartGame() {
                stopTimer();
                startGame();
            }

            function toggleSound() {
                soundEnabled = !soundEnabled;
                if (soundEnabled) {
                    soundIcon.innerHTML = '<path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>';
                } else {
                    soundIcon.innerHTML = '<path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>';
                }
            }

            function toggleControlMode() {
                controlMode = controlMode === 'swipe' ? 'buttons' : 'swipe';
                localStorage.setItem('controlMode2048', controlMode);
                updateControlModeUI();
            }

            function updateControlModeUI() {
                if (controlMode === 'buttons') {
                    modeToggle.classList.add('active');
                    modeText.textContent = '滑动';
                    modeIcon.innerHTML = '<path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>';
                    mobileControls.classList.add('active');
                } else {
                    modeToggle.classList.remove('active');
                    modeText.textContent = '按键';
                    modeIcon.innerHTML = '<path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>';
                    mobileControls.classList.remove('active');
                }
            }

            function handleDPad(dir) {
                if (!gameStarted || gamePaused || gameOver) return;
                move(dir);
            }

            function handleKeydown(e) {
                if (!gameStarted || gamePaused || gameOver) return;

                const keyMap = {
                    'ArrowUp': 'up',
                    'ArrowDown': 'down',
                    'ArrowLeft': 'left',
                    'ArrowRight': 'right',
                    'w': 'up',
                    'W': 'up',
                    's': 'down',
                    'S': 'down',
                    'a': 'left',
                    'A': 'left',
                    'd': 'right',
                    'D': 'right'
                };

                if (keyMap[e.key]) {
                    e.preventDefault();
                    move(keyMap[e.key]);
                }
            }

            function init() {
                createParticles();
                initGrid();
                updateBestScoreDisplay();
                updateControlModeUI();

                startBtn.addEventListener('click', startGame);
                pauseBtn.addEventListener('click', togglePause);
                restartBtn.addEventListener('click', restartGame);
                overlayBtn.addEventListener('click', () => {
                    if (gamePaused) {
                        togglePause();
                    } else {
                        restartGame();
                    }
                });
                soundToggle.addEventListener('click', toggleSound);
                modeToggle.addEventListener('click', toggleControlMode);
                document.addEventListener('keydown', handleKeydown);

                document.querySelectorAll('.d-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        handleDPad(btn.dataset.dir);
                    });
                    btn.addEventListener('touchstart', (e) => {
                        e.preventDefault();
                        handleDPad(btn.dataset.dir);
                    }, {passive: false});
                });

                let touchStartX = 0;
                let touchStartY = 0;
                let isSwiping = false;

                const gameContainer = document.querySelector('.game-container');

                gameContainer.addEventListener('touchstart', (e) => {
                    if (controlMode !== 'swipe') return;
                    touchStartX = e.touches[0].clientX;
                    touchStartY = e.touches[0].clientY;
                    isSwiping = true;
                }, {passive: true});

                gameContainer.addEventListener('touchmove', (e) => {
                    if (controlMode !== 'swipe') return;
                    if (!isSwiping || !gameStarted || gamePaused || gameOver) return;
                    
                    const touchCurrentX = e.touches[0].clientX;
                    const touchCurrentY = e.touches[0].clientY;
                    const deltaX = touchCurrentX - touchStartX;
                    const deltaY = touchCurrentY - touchStartY;
                    const minSwipeDistance = 50;

                    if (Math.abs(deltaX) > minSwipeDistance || Math.abs(deltaY) > minSwipeDistance) {
                        isSwiping = false;
                        
                        if (Math.abs(deltaX) > Math.abs(deltaY)) {
                            move(deltaX > 0 ? 'right' : 'left');
                        } else {
                            move(deltaY > 0 ? 'down' : 'up');
                        }
                    }
                }, {passive: true});

                gameContainer.addEventListener('touchend', () => {
                    isSwiping = false;
                }, {passive: true});
            }

            return {init};
        })();

        document.addEventListener('DOMContentLoaded', Game2048.init);
    </script>
</body>
